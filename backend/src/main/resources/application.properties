spring.application.name=backend
spring.datasource.url=jdbc:mysql://${DB_HOST:127.0.0.1}:3306/carlog_db?useSSL=${isSecure:false}&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
logging.level.org.springframework.security=INFO

##Configuraciµn JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show.sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

##Configuraciµn del puerto del servidor
server.port=8081

##Configuraciµn JWT
application.security.jwt.secret-key=${JWT_SECRET_KEY}
application.security.jwt.expiration=86400000

##Configuraciµn Swagger API
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.model-converters.pageable-converter.enabled=true
springdoc.remove-broken-reference-definitions=true
springdoc.default-flat-param-object=true
springdoc.use-fqn=true
springdoc.ignored-types=java.security.Principal,org.springframework.security.core.Authentication
springdoc.api-docs.resolve-schema-properties=false
springdoc.show-actuator=false

##Configuraciµn Cloudinary
cloudinary.cloud_name=${API_NAME}
cloudinary.api_key=${CLOUDINARY_API_KEY}
cloudinary.api_secret=${API_SECRET}

##Configuraciµn FlyWay
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=false
logging.level.org.flywaydb=TRACE
spring.jpa.defer-datasource-initialization=true
spring.flyway.locations=classpath:db/migration

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${GMAIL_MAIL}
spring.mail.password=${GMAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true