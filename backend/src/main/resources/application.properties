spring.application.name=backend
spring.datasource.url=jdbc:mysql://${DB_HOST:127.0.0.1}:3306/carlog_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

##Configuraciµn JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show.sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

##Configuraciµn del puerto del servidor
server.port=8081

application.security.jwt.secret-key=${JWT_SECRET_KEY:clave_local_por_defecto_solo_para_desarrollo_nunca_usar_en_prod}
application.security.jwt.expiration=86400000
