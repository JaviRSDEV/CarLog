<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #f4f7f6; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: #ffffff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .header { background-color: #2c3e50; color: white; padding: 15px; text-align: center; border-radius: 8px 8px 0 0; margin: -30px -30px 20px -30px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1 style="margin: 0; font-size: 24px;">¡Bienvenido a la plantilla!</h1>
    </div>
    <p>Hola <strong th:text="${userName}">Usuario</strong>,</p>
    <p>Has sido invitado a unirte al taller <strong style="color: #0d6efd;" th:text="${workshopName}">Taller</strong> con el puesto de <strong th:text="${roleName}">Rol</strong>.</p>
    <p>Accede a la plataforma para aceptar o rechazar la invitación y empezar a trabajar con el equipo.</p>
    <br>
    <p>Saludos,<br><strong>El equipo de CarLog</strong></p>
</div>
</body>
</html>
